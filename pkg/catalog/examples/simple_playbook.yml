- title: user_ray
  type: builtin.user
  present: true
  data:
    username: ray
    shell: "/bin/bash"
    groups:
      - max
  require:
    title: group_max
    type: builtin.group

- title: group_max
  type: builtin.group
  present: true
  data:
    name: max

