definitions:
  requests.RetrieveSignedCertificate:
    properties:
      csr:
        type: string
      node_name:
        type: string
    required:
    - csr
    - node_name
    type: object
  requests.SubmitCertificateRequest:
    properties:
      csr:
        type: string
      node_name:
        type: string
    required:
    - csr
    - node_name
    type: object
  responses.ErrorResponse:
    properties:
      details:
        type: string
      error:
        type: string
    type: object
  responses.GetRootCA:
    properties:
      certificate:
        type: string
    type: object
  responses.MessageResponse:
    properties:
      details:
        type: string
    type: object
  responses.RetrieveSignedCertificate:
    properties:
      certificate:
        type: string
    type: object
info:
  contact: {}
paths:
  /v1/certificates/retrieve:
    post:
      consumes:
      - application/json
      description: retrieve a node signed certificate
      parameters:
      - description: Name of the node, along the CSR
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/requests.RetrieveSignedCertificate'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responses.RetrieveSignedCertificate'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: Retrieve a certificate once it has been signed
      tags:
      - certificates
  /v1/certificates/root:
    get:
      description: get root ca from server
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responses.GetRootCA'
      summary: Used to get the root CA from the server
      tags:
      - certificates
  /v1/certificates/submit:
    post:
      consumes:
      - application/json
      description: submit an unsigned certificate
      parameters:
      - description: Name of the node, along the CSR
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/requests.SubmitCertificateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/responses.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: Used to submit a certificate
      tags:
      - certificates
swagger: "2.0"
