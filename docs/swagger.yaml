        type: string
      when:
        type: string
    type: object
  models.ResourceRequire:
    properties:
      title:
        type: string
      type:
        type: string
    type: object
  models.Role:
    properties:
      included_resources:
        additionalProperties:
          $ref: '#/definitions/models.IncludedResources'
        type: object
      loaded_resources:
        items: {}
        type: array
      name:
        type: string
      resources:
        items:
